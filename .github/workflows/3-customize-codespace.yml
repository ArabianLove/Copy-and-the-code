name: Step 3, Customize Codespace

# This step triggers after we push to main.
# This workflow updates from step 3 to step 4.

# This will run every time.
# Reference: https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows
on:
  workflow_dispatch:
  push:
    branches:
      - main

# Reference: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  # Need `contents: read` to checkout the repository.
  # Need `contents: write` to update the step metadata.
  contents: write

jobs:
  # Get the current step to only run the main job when the learner is on the same step.
  get_current_step:
    name: Check current step number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: get_step
        run: |
          echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_DependabotSecurityUpdates:
    name: On Copilot Analysis Complete
    needs: get_current_step

    # We will only run this action when:
    # 1. This repository isn't the template repository.
    # 2. The step is currently 3.
    # Reference: https://docs.github.com/en/actions/learn-github-actions/contexts
    # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions
    if: >-
      ${{ !github.event.repository.is_template
          && needs.get_current_step.outputs.current_step == 3 }}

    # We'll run Ubuntu for performance instead of Mac or Windows.
    runs-on: ubuntu-latest

    steps:
      # We'll need to check out the repository so that we can edit the README.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Let's get all the branches.

      # Verify the postCreateCommand was added.
      - name: Check for postCreateCommand
        id: check_postcreate
        continue-on-error: true
        uses: skills/action-check-file@v1
        with:
          file: ".devcontainer/devcontainer.json"
          search: "postCreateCommand"

      # Verify the learner used Copilot to improve the code
      - name: Check for Copilot code improvements
        id: check_reduce
        continue-on-error: true
        uses: skills/action-check-file@v1
        with:
          file: "analyze.js"
          search: "reduce"

      # Report all check results with actionable guidance when checks fail.
      - name: Report check results
        if: steps.check_postcreate.outcome == 'failure' || steps.check_reduce.outcome == 'failure'
        run: |
          echo "## ❌ Step 3 checks failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_postcreate.outcome }}" == "failure" ]; then
            cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          ### Missing: `postCreateCommand` in `.devcontainer/devcontainer.json`
          Add the following to `.devcontainer/devcontainer.json` before the last `}`:
          ```jsonc
            ,
            "postCreateCommand": "echo '# Writing code upon codespace creation!' >> codespace.md"
          ```

          SUMMARY
          fi
          if [ "${{ steps.check_reduce.outcome }}" == "failure" ]; then
            cat >> $GITHUB_STEP_SUMMARY << 'SUMMARY'
          ### Missing: `reduce` usage in `analyze.js`
          Use GitHub Copilot to rewrite the `calculateTotal` function in `analyze.js` using `Array.reduce()`, then commit and push the changes.

          SUMMARY
          fi
          exit 1

      # In README.md, switch step 3 for step 4.
      - name: Update to step 4
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 3
          to_step: 4
